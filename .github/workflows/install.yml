name: install-and-smoke

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgsl-dev libeigen3-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gsl eigen

      - name: Install pytdcrsv
        run: python -m pip install -e ./Required/tdcr-lilge-binding

      - name: Install tdcrpinn
        run: python -m pip install -e .

      - name: Smoke import test
        run: python -c "import pytdcrpinn; import pytdcrsv; print('smoke-ok')"
